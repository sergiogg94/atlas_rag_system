databases:
  # PostgreSQL Database
  - name: atlas-db
    plan: free
    databaseName: atlas_db
    user: atlas_user
    region: oregon
    ipAllowList: []

services:
  # Backend API (FastAPI)
  - type: web
    name: atlas-backend
    plan: free
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile.backend
    envVars:
      # Database connection
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      
      # API Keys
      - key: VOYAGE_API_KEY
        sync: false  # configured in the web panel
      - key: HF_TOKEN
        sync: false  # configured in the web panel
      
      # App settings
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_BASE_URL
        value: "https://atlas-backend-qgq0.onrender.com"
    
    healthCheckPath: /health

  # Frontend (Gradio)
  - type: web
    name: atlas-frontend
    plan: free
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      # API connection
      - key: API_BASE_URL
        value: "https://atlas-backend-qgq0.onrender.com"
      
      # Gradio settings
      - key: GRADIO_SERVER_NAME
        value: "0.0.0.0"
      - key: GRADIO_SERVER_PORT
        value: "7860"
      - key: GRADIO_SHARE
        value: "False"

  # Dashboard (Streamlit)
  - type: web
    name: atlas-dashboard
    plan: free
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile.dashboard
    envVars:
      - key: API_BASE_URL
        value: "https://atlas-backend-qgq0.onrender.com"